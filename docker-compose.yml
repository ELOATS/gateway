services:
  # 1. 编排层 (Orchestration - Go)
  orchestration:
    build:
      context: .
      dockerfile: core-go/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PYTHON_ADDR=intelligence:50051
      - RUST_ADDR=nitro:50052
      - REDIS_ADDR=redis:6379
      - GATEWAY_API_KEY=${GATEWAY_API_KEY:-sk-gw-default-123456}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      intelligence:
        condition: service_started
      nitro:
        condition: service_started
    networks:
      - gateway-network

  # 2. 智能层 (Intelligence - Python)
  intelligence:
    build:
      context: .
      dockerfile: logic-python/Dockerfile
    volumes:
      - intelligence-data:/app/logic-python/data
    environment:
      - PYTHON_GRPC_PORT=50051
    networks:
      - gateway-network

  # 3. 加速层 (Nitro - Rust)
  nitro:
    build:
      context: .
      dockerfile: utils-rust/Dockerfile
    environment:
      - RUST_GRPC_PORT=50052
    networks:
      - gateway-network

  # 4. Redis (Rate Limit & Context Store)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - gateway-network

  # 5. Qdrant (Semantic Cache)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - gateway-network

networks:
  gateway-network:
    driver: bridge

volumes:
  intelligence-data:
  qdrant-data:
