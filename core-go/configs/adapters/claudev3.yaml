name: claudev3
base_url: https://api.anthropic.com/v1/messages
headers:
  anthropic-version: "2023-06-01"
  Content-Type: "application/json"
request_mapping:
  header_template:
    x-api-key: "{{.Key}}"
  body_extra:
    max_tokens: 1024
    # 映射逻辑在 DynamicAdapter 中目前以透传为主，
    # 复杂映射（如 messages 格式转换）将在 1.3 迭代中通过模板引擎深化。
