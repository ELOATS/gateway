name: GitOps CD Pipeline

on:
  push:
    branches:
      - main
      - master
    # 通常 CD 也会排除掉包含 k8s 的提交，防止死循环触发（如果分离了仓库则不需要）
    paths-ignore:
      - 'k8s/**'
      - '**/*.md'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_GO: ${{ github.repository }}-go
  IMAGE_NAME_PYTHON: ${{ github.repository }}-python
  IMAGE_NAME_RUST: ${{ github.repository }}-rust

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建并推送 Go 服务
      - name: Build and push Go Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./core-go/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_GO }}:${{ github.sha }}

      # 构建并推送 Python 服务
      - name: Build and push Python Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./logic-python/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PYTHON }}:${{ github.sha }}

      # 构建并推送 Rust 服务
      - name: Build and push Rust Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./utils-rust/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_RUST }}:${{ github.sha }}

  update-manifests:
    name: Update K8s Manifests (GitOps)
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write # 需要写权限来更新代码仓库

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Kubernetes manifests
        run: |
          # 将三个基础镜像的 tag 更新为最新构架出的 git commit hash
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_GO }}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_GO }}:${{ github.sha }}|g" k8s/gateway-all-in-one.yaml
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PYTHON }}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PYTHON }}:${{ github.sha }}|g" k8s/gateway-all-in-one.yaml
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_RUST }}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_RUST }}:${{ github.sha }}|g" k8s/gateway-all-in-one.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add k8s/
          
          # 这个判断确保如果没有产生任何变更就不执行无用的 commit 报错
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(gitops): update image tags to ${{ github.sha }} [skip ci]"
            git push
          fi
