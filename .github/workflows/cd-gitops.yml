name: GitOps CD Pipeline

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'k8s/**'
      - '**/*.md'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 动态获取并转换为全小写的 Repository 名字，因为 Docker Registry 不允许大写
      - name: Lowercase Repository Name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Go Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./core-go/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-go:${{ github.sha }}

      - name: Build and push Python Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./logic-python/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-python:${{ github.sha }}

      - name: Build and push Rust Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./utils-rust/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-rust:${{ github.sha }}

  update-manifests:
    name: Update K8s Manifests (GitOps)
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # CD 阶段同样需要小写，以便推入 YAML 时是最正确的镜像名
      - name: Lowercase Repository Name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Update Kubernetes manifests
        run: |
          sed -i "s|image: .*gateway-go.*|image: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-go:${{ github.sha }}|g" k8s/gateway-all-in-one.yaml
          sed -i "s|image: .*gateway-python.*|image: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-python:${{ github.sha }}|g" k8s/gateway-all-in-one.yaml
          sed -i "s|image: .*gateway-rust.*|image: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-rust:${{ github.sha }}|g" k8s/gateway-all-in-one.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add k8s/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(gitops): update image tags to ${{ github.sha }} [skip ci]"
            git push
          fi
